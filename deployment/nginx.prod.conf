# ============================================================
# nginx.prod.conf — EDITA "TU_DOMINIO" con tu subdominio real
# Ejemplo: mymemo.duckdns.org
# ============================================================

# Redirige HTTP → HTTPS (excepto challenge de Let's Encrypt)
server {
    listen 80;
    server_name TU_DOMINIO;

    # Certbot necesita esta ruta para validar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — tráfico principal
server {
    listen 443 ssl;
    server_name TU_DOMINIO;

    # Certificados SSL generados por certbot
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;

    # Configuración SSL moderna
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Fotos pueden ser pesadas (hasta 15MB)
    client_max_body_size 20M;

    # ── API → FastAPI backend ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Tiempo extra para procesamiento de imágenes
    }

    # ── Frontend SPA (React) ──────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;  # React Router fallback
    }

    # Cache para assets compilados (JS/CSS con hash en nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }
}
